<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="author" content="Kyle Coulon" />
        <meta
            name="description"
            content="Kyle Coulon's WDD 131 – Dynamic Web Fundamentals Product Review Form Assignment."
        />
        <title>WDD 131 – Product Review Form – Kyle Coulon</title>
        <link rel="stylesheet" href="./styles/form.css" />

        <!-- Javascript  -->
        <script src="./scripts/form.js" defer></script>
    </head>
    <body>
        <header>
            <span id="course-title">WDD 131 – Dynamic Web Fundamentals</span>
            <nav>
                <ul class="navigation">
                    <li>
                        <a href="https://www.linkedin.com/in/kyle-coulon/" title="LinkedIn">LinkedIn</a>
                    </li>
                    <li>
                        <a href="https://byupw.instructure.com/" title="Canvas">Canvas</a>
                    </li>
                    <li>
                        <a
                            href="https://www.churchofjesuschrist.org/study/scriptures/bofm/3-ne/5?lang=eng&id=p13#p13"
                            title="Scripture"
                            >Scripture</a
                        >
                    </li>
                    <li><a href="#" title="Final Project">Final Project</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1>Product Review Form</h1>
            <form method="get" action="review.html">
                <fieldset>
                    <label for="product">Product Name*</label>
                    <select id="product" name="product" required>
                        <option value="" selected disabled>Select a Product ...</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Overall Rating*</legend>
                    <div id="rating-stars">
                        <input type="radio" id="star5" name="rating" value="5" required />
                        <label for="star5">&star;</label>
                        <input type="radio" id="star4" name="rating" value="4" required />
                        <label for="star4">&star;</label>
                        <input type="radio" id="star3" name="rating" value="3" required />
                        <label for="star3">&star;</label>
                        <input type="radio" id="star2" name="rating" value="2" required />
                        <label for="star2">&star;</label>
                        <input type="radio" id="star1" name="rating" value="1" required />
                        <label for="star1">&star;</label>
                    </div>
                </fieldset>

                <fieldset>
                    <label for="install-date">
                        Date of Installation*
                        <input type="date" id="install-date" name="install-date" required />
                    </label>
                </fieldset>

                <fieldset>
                    <legend>Which features did you find useful in the product?</legend>
                    <p class="legend-note"><em>(Check all that apply)</em></p>
                    <label for="feature1" class="checkbox-label">
                        Feature 1
                        <input type="checkbox" id="feature1" name="features" value="feature1"
                    /></label>

                    <label for="feature2" class="checkbox-label">
                        Feature 2
                        <input type="checkbox" id="feature2" name="features" value="feature2"
                    /></label>

                    <label for="feature3" class="checkbox-label">
                        Feature 3
                        <input type="checkbox" id="feature3" name="features" value="feature3"
                    /></label>

                    <label for="feature4" class="checkbox-label">
                        Feature 4
                        <input type="checkbox" id="feature4" name="features" value="feature4"
                    /></label>
                </fieldset>

                <fieldset>
                    <label for="review">Written Review</label>
                    <textarea id="review" name="review"></textarea>
                </fieldset>

                <fieldset>
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" />
                </fieldset>

                <input type="hidden" name="submitted" value="true" />
                <input type="submit" value="Post Review" />
            </form>
        </main>
        <footer>
            <p>
                <span id="currentyear"></span>
                Kyle Coulon - Utah
            </p>
            <p id="lastModified"></p>
        </footer>
    </body>
</html>
