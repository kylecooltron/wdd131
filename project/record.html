<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fly Fishing Spot Explorer</title>
        <meta name="author" content="Kyle Coulon" />
        <meta
            name="description"
            content="Kyle Coulon's WDD 131 – Dynamic Web Fundamentals course - Fly Fishing Spot Explorer - Catch Record."
        />

        <!-- Styles -->
        <link rel="stylesheet" href="./styles/styles.css" />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=PT+Serif:wght@700&display=swap"
            rel="stylesheet"
        />

        <!-- Javascript  -->
        <script src="./scripts/base.js" defer></script>
        <script src="./scripts/record.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Fly Fishing Spot Explorer</h1>
            <nav>
                <ul class="navigation">
                    <li>
                        <a href="./index.html" title="Home">Home</a>
                    </li>
                    <li>
                        <a href="./map.html" title="Map">Map</a>
                    </li>
                    <li>
                        <a href="#" title="Record">Catch Record</a>
                    </li>
                </ul>
            </nav>
        </header>

        <main id="catch-record-main">
            <picture id="catch-record-background">
                <source media="(min-width: 800px)" srcset="./images/brown_trout.webp" />
                <img src="./images/fly.webp" alt="Brown Trout & Salmon fly pattern on a vice." loading="lazy" />
            </picture>

            <section id="record-form-section">
                <h2>Catch Record</h2>

                <form method="get" action="catch-recorded.html">
                    <fieldset>
                        <label for="catch-date" class="field-label">
                            Date of Catch*
                            <input type="datetime-local" id="catch-date" name="catch-date" required />
                        </label>
                    </fieldset>

                    <fieldset>
                        <label for="species" class="field-label">Fish Species</label>
                        <select id="species" name="species" required>
                            <option value="" selected disabled>Select a Species ...</option>
                        </select>
                    </fieldset>

                    <fieldset>
                        <label for="length" class="field-label">Length</label>
                        <input type="number" id="length" name="length" />
                    </fieldset>

                    <fieldset>
                        <label for="location" class="field-label">Location</label>
                        <select id="location" name="location">
                            <option value="" selected disabled>Select a Location ...</option>
                        </select>
                    </fieldset>

                    <fieldset>
                        <legend class="field-label">Fly Type</legend>
                        <div>
                            <input type="radio" id="nymph" name="fly-type" value="Nymph" />
                            <label for="nymph">Nymph</label>

                            <input type="radio" id="dry" name="fly-type" value="Dry" />
                            <label for="dry">Dry</label>

                            <input type="radio" id="streamer" name="fly-type" value="Streamer" />
                            <label for="streamer">Streamer</label>
                        </div>
                    </fieldset>

                    <fieldset>
                        <label for="pattern" class="field-label">Fly Pattern</label>
                        <input type="text" id="pattern" name="pattern" />
                    </fieldset>

                    <fieldset>
                        <label for="notes" class="field-label">Notes</label>
                        <textarea id="notes" name="notes"></textarea>
                    </fieldset>

                    <input type="hidden" name="submitted" value="true" />
                    <input type="submit" value="Record Catch" class="action-button" />
                </form>
            </section>
        </main>
        <footer>
            <p>
                <span id="currentyear"></span>
                Kyle Coulon - Utah
            </p>
            <p id="lastModified"></p>
        </footer>
    </body>
</html>
